# FLiP.jl default parameter configuration
# Edit values here to change package-wide defaults without modifying source code.
# Reload at runtime with: FLiP.load_config!("path/to/this/file")

[pipeline]
input_path = ""            # Input LAS/LAZ file path
output_dir = ""            # Output directory path
output_prefix = "output"   # Prefix for written files

subsample_res = 0.05        # Minimum distance (m) for optional subsampling

# Pipeline stage controls (in execution order)
enable_subsample           = false  # If true, downstream stages use subsampled cloud
enable_preprocess          = true   # If true, run preprocess (filter etc.) and write output
enable_agh                 = true   # If true, compute AGH and write AGH cloud
enable_ground_segmentation = true   # Run ground segmentation stage
enable_tree_segmentation   = true   # Run tree segmentation stage
enable_qsm                 = true   # Run qsm() placeholder stage
enable_generate_report     = true   # Run generate_report() placeholder stage

xy_resolution = 0.05        # XY resolution (m) for IDW AGH interpolation grid
idw_k = 8                   # Number of neighbors for IDW interpolation
idw_power = 2.0             # IDW power parameter

[preprocess]
enable_statistical_filter = false # If true, apply statistical_filter after subsampling

[segment_ground]
voxel_size     = 0.5  # Voxel size (m) for connected-component pre-filter
min_cc_size    = 50   # Minimum component size for connected-component pre-filter
grid_size      = 0.5  # XY grid cell size (m) for grid z-min filter
cone_theta_deg = 60.0 # Upward-cone half-angle (degrees)

[tree_segmentation]
nearground_agh_threshold = 0.3 # Keep points with AGH > threshold before tree segmentation
neighbor_radius = -1.0         # If <= 0, defaults to 1.5 * pipeline.subsample_res
slice_length = 0.1             # Slice length (m) along shortest-path distance
min_cc_size = 3                # Minimum component size retained in tree graph labeling
max_lcs_iterations = 5000      # Maximum iterative LCS extraction rounds per component
nbs_neighbor_distance = 2      # Hop distance for greedy NBS search
nbs_min_segment_size = 5       # Minimum points per NBS segment
nbs_max_iterations = 10000     # Maximum NBS iterations
ls_angle_threshold_deg = 60.0  # Max deviation (degrees) for linear segment continuity

[statistical_filter]
k_neighbors = 6       # Number of nearest neighbors for mean-distance computation
n_sigma     = 1.0     # Outlier threshold: mean + n_sigma * std

[voxel_connected_component_filter]
min_cc_size = 1       # Minimum component size (in points) to keep

[upward_conic_filter]
max_search_delta_z = 5.0  # Vertical span (m) used to cap horizontal search radius

[rnn_filter]
min_rnn_size = 1      # Minimum number of neighbors within radius to keep a point
