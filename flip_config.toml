# ════════════════════════════════════════════════════════════════════════════
# FLiP.jl configuration file
# ════════════════════════════════════════════════════════════════════════════
#
# This file controls the FLiP forest LiDAR processing pipeline. Sections are
# ordered to match pipeline execution: I/O → preprocess → ground → tree → QSM.
# Each section banner explains what stage it controls; edit values to tune.
#
# Reload at runtime:  FLiP.load_config!("path/to/this/file")
# Run the pipeline:   FLiP.run_pipeline(config_path = "path/to/this/file")
#
# Field names below match Julia struct paths exactly, e.g.
#   `tree.model.min_node_size` (TOML) ↔ `cfg.tree.model.min_node_size` (Julia).
# ════════════════════════════════════════════════════════════════════════════


# ════════════════════════════════════════════════════════════════════════════
# Pipeline — I/O paths, stage toggles, shared data parameters
# ════════════════════════════════════════════════════════════════════════════
[pipeline]
# --- I/O ---
input_path           = ""             # File path OR directory (use input_prefix to filter)
input_prefix         = ""             # Filename prefix filter when input_path is a directory ("" = all files)
input_format         = "las"          # "las", "laz", or "e57"
output_dir           = ""             # Output directory (must exist or be creatable)
output_prefix        = "output"       # Prefix prepended to every written file
output_format        = "las"          # "las" or "e57"
coordinate_precision = "Float32"      # "Float32" (memory-efficient) or "Float64" (high precision)

# --- Data parameters ---
subsample_res = 0.05                  # Minimum point spacing (m) for optional subsampling

# --- Stage toggles (true = run, false = skip) ---
enable_subsample           = true    # If true, downstream stages use the subsampled cloud
enable_preprocess          = true     # Stage 1: optional denoising
enable_ground_segmentation = true     # Stage 2: ground vs. above-ground split
enable_agh                 = true     # Above-ground-height attribute via IDW interpolation
enable_tree_segmentation   = true     # Stage 3: per-tree clustering
enable_qsm                 = true     # Stage 4: quantitative structural modeling
enable_generate_report     = true     # Optional summary report (currently placeholder)

# --- Logging ---
enable_debug_info = false             # If true, show low-level helper @info logs (assembly iteration, orphan rescue, etc.); default false silences them

# --- Threading ---
# Number of threads for parallelizable inner loops (statistical_filter, NBS PCA,
# orphan KDTree voting, tree aggregation, per-connected-component segmentation).
# Positive  → use that many threads (capped by Julia's --threads count).
# 0 or 1    → serial (default).
# Negative  → Sys.CPU_THREADS + n_thread (e.g. -1 = all-but-one logical core).
# Julia must be launched with `julia --threads=N` (or JULIA_NUM_THREADS=N) for
# this to have any effect.
n_thread = 1

# --- Ground interpolation (only used if enable_agh = true) ---
xy_resolution = 0.05                  # Grid cell size (m) for IDW interpolation
idw_k         = 8                     # Number of nearest neighbors
idw_power     = 2.0                   # IDW distance-weighting exponent


# ════════════════════════════════════════════════════════════════════════════
# Stage 1: Preprocess
# Optional denoising applied to the raw cloud before downstream stages.
# ════════════════════════════════════════════════════════════════════════════
[preprocess]
enable_statistical_filter = false     # If true, apply statistical_filter after subsampling

[statistical_filter]
# Used by preprocess (if enabled) and by per-slice QC in QSM stage.
k_neighbors = 6                       # Number of nearest neighbors for mean-distance computation
n_sigma     = 1.0                     # Outlier threshold: mean + n_sigma × std


# ════════════════════════════════════════════════════════════════════════════
# Stage 2: Ground segmentation
# Separates ground points from above-ground vegetation. Produces the ground
# polygon used to crop the cloud and the surface used to compute AGH.
# ════════════════════════════════════════════════════════════════════════════
[segment_ground]
voxel_size         = 0.5              # Voxel size (m) for connected-component pre-filter
min_cc_size        = 50               # Minimum component size for the CC pre-filter
grid_size          = 0.5              # XY grid cell size (m) for grid z-min filter
cone_theta_deg     = 60.0             # Upward-cone half-angle (degrees) for vegetation removal
polygon_buffer     = 0.0              # Buffer distance (m) around ground convex hull for cropping
enable_ground_crop = true             # Crop point cloud to buffered ground polygon before AGH


# ════════════════════════════════════════════════════════════════════════════
# Stage 3+4: Tree (the whole forest-structure pipeline, one merged domain)
# label NBS → trial model → refine → assemble → final model. Configured as one
# nested [tree] domain:
#   [tree]          — KEY extraction dials you tune per dataset (TLS vs MLS vs ALS)
#   [tree.assembly] — tree-assembly gates (also used by refine Rule B)
#   [tree.refine]   — pre-assembly NBS refinement (advanced)
#   [tree.model]    — QSM cylinder fitting; drives BOTH the trial and final model (advanced)
# ════════════════════════════════════════════════════════════════════════════
[tree]
neighbor_radius          = -1.0   # CC/NBS graph radius; if ≤ 0, defaults to 2.0 × pipeline.subsample_res
min_nbs_size             = 5      # Minimum points per NBS segment (also min CC size for tree graph)
nearground_agh_threshold = 0.3    # Keep only points with AGH > threshold before tree segmentation
linearity_angle_deg      = 80.0   # Max angular deviation (deg) for NBS expansion direction filtering
nbs_neighbor_distance    = 2      # Hop distance for greedy NBS search
frontier_min_cc_size     = 3      # Minimum frontier CC size during NBS greedy expansion

[tree.assembly]
merge_threshold     = 0.8         # Fraction of skeleton nodes connected required to merge (Rule A/B; also refine Rule B)
occlusion_tolerance = 0.1         # Max distance (m) when rescuing orphan NBS via occlusion gap

[tree.refine]
enable                  = true    # Run pre-assembly NBS refinement (Rule B + node-level volume overlap)
overlap_threshold       = 0.2     # Claim a node when inter_vol(node, focal) / vol(node) exceeds this
voxel_res_scalar        = 1.0     # × subsample_res → voxel edge for the overlap estimator (≈ point spacing)
completeness_gate       = 0.25    # Both the moving node and the focal NBS need completeness ≥ this
min_points_gate         = 20      # The focal NBS needs ≥ this many points (per-focal)
candidate_radius_scalar = 1.0     # Extra KDTree candidate-search margin (× subsample_res)
mode                    = "apply" # "apply" (relabel) | "flag_only" (report only)

[tree.model]
nbs_linearity_threshold = 0.5     # Minimum linearity (λ₃-λ₂)/λ₃ for an NBS to be modeled
slice_height_scalar     = 3.0     # × subsample_res → z-slice height
min_node_size           = 5       # Minimum points per slice to keep
phi_bin_min             = 36      # Minimum angular bins for rho-phi grid
phi_bin_max             = 360     # Maximum angular bins for rho-phi grid
surface_res_scalar      = 0.5     # × subsample_res → 2D surface grid resolution
completeness_threshold  = 0.25    # Minimum fraction of phi-bins filled to accept a slice
breast_height           = 1.3     # Reference height (m) for DBH calculation
spl_z_smoothing         = 0.3     # Cross-slice smoothing weight for spline method (0=disabled, 1=max)
rho_percentile          = 1.0     # Per-slice rho filter before 2D surface fit (1.0 = no filtering)
min_octant_taubin       = 3       # Min distinct angular octants (of 8) for a slice to use Taubin circle fit
qc_enable               = true    # Per-slice quality control (drops SOR outliers, keeps dominant CC)
qc_continuity_ratio     = 0.7     # If 2nd-largest CC size ≥ ratio × largest, break tie by centroid distance
